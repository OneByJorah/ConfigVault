# Push to GitHub repository
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git
        run: |
          git config --global user.email "bot@netvault.local"
          git config --global user.name "NetVault Bot"
      - name: Commit and Push
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-update files"
          git push 2>/dev/null || echo "Already up to date"
