# CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Check Python syntax
        run: |
          find . -name '*.py' -not -path './.git/*' -exec python3 -m py_compile {} \;
      - name: Run Tests
        run: pytest --cov=app --cov-report=term-missing || echo "No test files found — add tests to tests/"
